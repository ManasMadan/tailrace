name: Release

# Tag-triggered releases. Versions move in lockstep across all packages
# (changesets `fixed` group), so one signed semver tag releases everything:
#
#   pnpm changeset          # with each PR: describe the change
#   pnpm changeset version  # on release day: bump versions + changelogs
#   git commit -m "chore(release): v0.2.0" && git tag -s v0.2.0 -m v0.2.0
#   git push origin master v0.2.0
#
# The workflow verifies the tag matches the workspace version, runs the
# packaging guards, publishes every public package to npm with provenance,
# and creates a GitHub release with notes from the core changelog.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

permissions:
  contents: write
  id-token: write # npm --provenance

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Tag must match the workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "require('./packages/walcast/package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match package version $version — run 'pnpm changeset version' and retag"
            exit 1
          fi

      - run: node scripts/check-lean-core.mjs
      - run: node scripts/verify-tarballs.mjs

      - name: Publish to npm with provenance
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: GitHub release with changelog notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk "/^## ${version//./\\.}/{found=1; next} /^## /{found=0} found" packages/walcast/CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See per-package CHANGELOG.md files." > notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
